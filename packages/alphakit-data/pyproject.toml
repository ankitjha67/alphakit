[project]
name = "alphakit-data"
version = "0.0.1"
description = "AlphaKit data adapters: yfinance, CCXT, FRED, local parquet cache."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "alphakit-core",
    "numpy>=1.26",
    "pandas>=2.2",
    "pyarrow>=14.0",
]

[project.optional-dependencies]
yfinance = ["yfinance>=0.2"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alphakit"]
