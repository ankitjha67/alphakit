[project]
name = "alphakit-bridges"
version = "0.0.1"
description = "AlphaKit engine bridges: internal, vectorbt, backtrader, LEAN, nautilus."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "Ankit Jha" }]
dependencies = [
    "alphakit-core",
    "numpy>=1.26",
    "pandas>=2.2",
]

[project.optional-dependencies]
vectorbt = ["vectorbt>=0.26"]
backtrader = ["backtrader>=1.9"]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alphakit"]
