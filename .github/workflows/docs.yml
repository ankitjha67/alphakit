name: Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # required by peaceiris/actions-gh-pages

jobs:
  build-and-deploy:
    name: Build MkDocs and deploy to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs-material "git-revision-date" needs full history

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: publish site from ${{ github.sha }}"
