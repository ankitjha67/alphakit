name: Verify Install

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref to test — tag (v0.1.1) or branch name"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install sub-packages in dependency order
        run: |
          TAG="${{ steps.tag.outputs.ref }}"
          REPO="https://github.com/ankitjha67/alphakit.git"

          for pkg in core data bridges \
                     strategies-trend strategies-meanrev strategies-carry \
                     strategies-value strategies-volatility strategies-rates \
                     strategies-commodity strategies-options \
                     bench; do
            echo "::group::Installing alphakit-${pkg}"
            pip install "alphakit-${pkg} @ git+${REPO}@${TAG}#subdirectory=packages/alphakit-${pkg}"
            echo "::endgroup::"
          done

      - name: Verify imports — one strategy per family
        run: |
          python -c "
          from alphakit.core.protocols import StrategyProtocol, BacktestResult
          print('core: OK')

          def check_protocol(cls, family):
              inst = cls()
              if not isinstance(inst, StrategyProtocol):
                  raise RuntimeError(
                      f'{cls.__name__}() does not satisfy StrategyProtocol. '
                      f'Family: {family}. Has name={hasattr(inst, \"name\")}, '
                      f'generate_signals={hasattr(inst, \"generate_signals\")}.'
                  )
              print(f'{family}: OK ({cls.__name__})')

          from alphakit.strategies.trend.tsmom_12_1 import TimeSeriesMomentum12m1m
          check_protocol(TimeSeriesMomentum12m1m, 'trend')

          from alphakit.strategies.meanrev.bollinger_reversion import BollingerReversion
          check_protocol(BollingerReversion, 'meanrev')

          from alphakit.strategies.carry.fx_carry_g10 import FXCarryG10
          check_protocol(FXCarryG10, 'carry')

          from alphakit.strategies.value.pe_value import PEValue
          check_protocol(PEValue, 'value')

          from alphakit.strategies.volatility.vol_targeting import VolTargeting
          check_protocol(VolTargeting, 'volatility')

          from alphakit.strategies.rates.bond_tsmom_12_1 import BondTSMOM12m1m
          check_protocol(BondTSMOM12m1m, 'rates')

          from alphakit.strategies.commodity.commodity_tsmom import CommodityTSMOM12m1m
          check_protocol(CommodityTSMOM12m1m, 'commodity')

          from alphakit.strategies.options.covered_call_systematic import CoveredCallSystematic
          check_protocol(CoveredCallSystematic, 'options')

          from alphakit.bench.discovery import discover_slugs
          slugs = discover_slugs()
          if len(slugs) != 98:
              raise RuntimeError(
                  f'Discovery returned {len(slugs)} strategies, expected 98. '
                  f'First 10 found: {sorted(slugs)[:10]}. '
                  f'This indicates alphakit.bench.discovery is not finding '
                  f'strategies in the pip-installed layout.'
              )
          print(f'discovery: {len(slugs)} slugs OK')
          "

      - name: Run minimal backtest on fixture data
        run: |
          python -c "
          from alphakit.data.fixtures.generator import generate_fixture_prices
          from alphakit.bridges.vectorbt_bridge import run
          from alphakit.strategies.trend.tsmom_12_1 import TimeSeriesMomentum12m1m
          import math

          prices = generate_fixture_prices(['SPY', 'EFA', 'AGG'], start='2020-01-01', end='2024-12-31')
          result = run(strategy=TimeSeriesMomentum12m1m(), prices=prices)

          if result.meta.get('strategy') != 'tsmom_12_1':
              raise RuntimeError(
                  f'Backtest meta[\"strategy\"] = {result.meta.get(\"strategy\")!r}, '
                  f'expected \"tsmom_12_1\". Full meta: {result.meta}'
              )

          sharpe = result.metrics.get('sharpe')
          if sharpe is None or not math.isfinite(sharpe):
              raise RuntimeError(
                  f'Backtest Sharpe is {sharpe!r} (expected finite float). '
                  f'Full metrics: {result.metrics}'
              )

          print(f'Backtest OK: Sharpe={sharpe:.4f}')
          "
