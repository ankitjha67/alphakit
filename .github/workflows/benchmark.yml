name: Weekly Benchmark

on:
  schedule:
    - cron: "0 0 * * 0"  # Sunday 00:00 UTC
  workflow_dispatch: {}  # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Save previous Sharpes
        run: |
          python -c "
          import json, pathlib
          results = {}
          for f in pathlib.Path('packages').rglob('benchmark_results.json'):
              data = json.loads(f.read_text())
              if data.get('metrics', {}).get('sharpe') is not None:
                  results[data['slug']] = data['metrics']['sharpe']
          pathlib.Path('/tmp/old_sharpes.json').write_text(json.dumps(results))
          "

      - name: Run benchmarks
        run: uv run python scripts/benchmark_all.py --workers 4

      - name: Check for regressions
        id: regression-check
        run: |
          python -c "
          import json, pathlib, sys
          old = json.loads(pathlib.Path('/tmp/old_sharpes.json').read_text())
          regressions = []
          for f in pathlib.Path('packages').rglob('benchmark_results.json'):
              data = json.loads(f.read_text())
              slug = data['slug']
              new_sharpe = data.get('metrics', {}).get('sharpe')
              if slug in old and old[slug] is not None and new_sharpe is not None:
                  old_val = old[slug]
                  if old_val != 0 and (new_sharpe - old_val) / abs(old_val) < -0.20:
                      regressions.append(f'{slug}: {old_val:.4f} -> {new_sharpe:.4f}')
          if regressions:
              msg = 'Sharpe regressions >20%:\\n' + '\\n'.join(regressions)
              pathlib.Path('/tmp/regression_msg.txt').write_text(msg)
              print(f'::set-output name=regressed::true')
              print(msg)
          else:
              print('No regressions detected.')
              print(f'::set-output name=regressed::false')
          "

      - name: Commit updated benchmarks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/alphakit/strategies/*/*/benchmark_results.json
          git diff --cached --quiet || git commit -m "chore(bench): weekly benchmark update [skip ci]"
          git push

      - name: Open regression issue
        if: steps.regression-check.outputs.regressed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const msg = fs.readFileSync('/tmp/regression_msg.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Benchmark regression detected',
              body: `## Weekly benchmark regression\n\n\`\`\`\n${msg}\n\`\`\`\n\nPlease investigate. This may indicate a code regression or data issue.`,
              labels: ['benchmark', 'regression']
            });
